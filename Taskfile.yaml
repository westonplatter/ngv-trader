version: "3"

vars:
  ENV: '{{.ENV | default "dev"}}'

tasks:
  list:
    desc: List all available tasks
    aliases: [l]
    cmd: task --list-all

  api:
    desc: Start the FastAPI backend (port 8000)
    env:
      ENV: "{{.ENV}}"
    cmd: uv run uvicorn src.api.main:app --reload --port 8000

  frontend:
    desc: Start the Vite dev server (port 5173)
    dir: frontend
    cmd: bun run dev

  worker:jobs:
    desc: Start generic job worker (dispatches by job_type)
    env:
      ENV: "{{.ENV}}"
    cmd: uv run python scripts/work_jobs.py

  worker:orders:
    desc: Start order execution worker
    env:
      ENV: "{{.ENV}}"
    cmd: uv run python scripts/work_order_queue.py

  frontend:install:
    desc: Install frontend dependencies
    dir: frontend
    cmd: bun install

  migrate:
    desc: Run alembic migrations to head
    env:
      ENV: "{{.ENV}}"
    cmd: uv run alembic upgrade head

  migrate:down:
    desc: Downgrade one alembic migration
    env:
      ENV: "{{.ENV}}"
    cmd: uv run alembic downgrade -1

  migrate:new:
    desc: Create a new alembic migration (usage -- task migrate:new -- "description")
    env:
      ENV: "{{.ENV}}"
    cmd: uv run alembic revision --autogenerate -m "{{.CLI_ARGS}}"

  validate:
    desc: Check env file, Postgres, migrations, and optionally TWS
    cmd: uv run python scripts/validate_env.py --env {{.ENV}} {{.CLI_ARGS}}

  dev:
    desc: Start backend and frontend in parallel
    deps:
      - api
      - frontend
